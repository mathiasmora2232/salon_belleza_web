<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calendario — Belleza &amp; Estilo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/admin.css" />
  <link rel="stylesheet" href="css/citas.css" />
</head>
<body>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar__logo">
      <span class="sidebar__logo-text">Belleza <em>&</em> Estilo</span>
      <button type="button" class="sidebar__collapse" id="sidebarToggle" aria-label="Colapsar menú">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
    </div>
    <nav class="sidebar__nav">
      <p class="sidebar__section-label">Principal</p>
      <a href="admin.html" class="sidebar__link">
        <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
        </svg><span>Dashboard</span>
      </a>
      <a href="citas.html" class="sidebar__link">
        <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
        </svg><span>Citas</span>
      </a>
      <a href="calendario.html" class="sidebar__link sidebar__link--active">
        <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
          <circle cx="15" cy="16" r="3"/><path d="M15 15v1l.7.7"/>
        </svg><span>Calendario</span>
      </a>
      <a href="eventos-reservas.html" class="sidebar__link">
        <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <polyline points="20 12 20 22 4 22 4 12"/><rect x="2" y="7" width="20" height="5"/>
          <line x1="12" y1="22" x2="12" y2="7"/>
          <path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"/>
          <path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/>
        </svg><span>Eventos</span>
      </a>
      <a href="clientes.html" class="sidebar__link">
        <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
        </svg><span>Clientes</span>
      </a>
      <a href="estilistas.html" class="sidebar__link">
        <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg><span>Estilistas</span>
      </a>
      <p class="sidebar__section-label">Catálogo</p>
      <a href="servicios.html" class="sidebar__link">
        <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/>
          <polyline points="14 2 14 8 20 8"/>
        </svg><span>Servicios</span>
      </a>
      <a href="paquetes.html" class="sidebar__link">
        <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/>
          <line x1="10" y1="12" x2="14" y2="12"/>
        </svg><span>Paquetes</span>
      </a>
      <p class="sidebar__section-label">Sistema</p>
      <a href="usuarios.html" class="sidebar__link">
        <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg><span>Usuarios</span>
      </a>
      <a href="configuracion.html" class="sidebar__link">
        <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg><span>Configuración</span>
      </a>
    </nav>
  </aside>

  <!-- MAIN -->
  <main class="main" id="mainContent">
    <header class="topbar">
      <div class="topbar__left">
        <button type="button" class="topbar__menu-btn" id="mobileSidebarToggle" aria-label="Menú">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
        <h1 class="topbar__title">Calendario de citas</h1>
      </div>
      <div class="topbar__right">
        <span id="capacidadInfo" class="cal-capacidad-info"></span>
        <button class="btn-sm btn-sm--outline" id="btnHoy">Hoy</button>
        <div class="topbar__user" id="userMenu" style="cursor:pointer">
          <div class="topbar__avatar" id="userAvatar">U</div>
          <span class="topbar__username" id="userNameDisplay">—</span>
        </div>
      </div>
    </header>

    <div class="page-content">

      <!-- NAV DE SEMANA -->
      <div class="cal-nav">
        <button class="cal-nav__btn" id="btnPrevSem" aria-label="Semana anterior">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <span class="cal-nav__label" id="semanaLabel"></span>
        <button class="cal-nav__btn" id="btnNextSem" aria-label="Semana siguiente">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>

      <!-- LEYENDA -->
      <div class="cal-leyenda">
        <span class="cal-leyenda__item"><span class="cal-leyenda__dot" style="background:#22c55e"></span>Disponible</span>
        <span class="cal-leyenda__item"><span class="cal-leyenda__dot" style="background:#f59e0b"></span>Casi lleno</span>
        <span class="cal-leyenda__item"><span class="cal-leyenda__dot" style="background:#ef4444"></span>Lleno</span>
        <span class="cal-leyenda__item"><span class="cal-leyenda__dot" style="background:#a78bfa"></span>Evento grupal</span>
      </div>

      <!-- GRID -->
      <div class="cal-wrap">
        <div class="cal-grid" id="calGrid">
          <div class="cal-loading">Cargando calendario…</div>
        </div>
      </div>

    </div>
  </main>

  <!-- MODAL DETALLE CITA -->
  <div class="modal-overlay" id="citaDetailOverlay">
    <div class="modal" style="max-width:480px;width:100%">
      <div class="modal__header">
        <h2 class="modal__title" id="detailTitle">Cita</h2>
        <button type="button" class="modal__close" id="detailClose">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal__form" id="detailBody" style="padding:1.25rem 1.5rem"></div>
      <div class="modal__footer" style="padding:.75rem 1.5rem;border-top:1px solid var(--border);display:flex;gap:.5rem;justify-content:flex-end">
        <a id="detailEditLink" href="citas.html" class="btn-xs btn-xs--blue">Ir a citas</a>
        <button type="button" class="btn-xs btn-xs--outline" id="detailCloseBtn">Cerrar</button>
      </div>
    </div>
  </div>

  <script src="js/auth-guard.js"></script>
  <script src="js/sidebar.js"></script>
  <script src="js/calendario.js"></script>
</body>
</html>
